appId: one.dmj.shadownotes
productName: ShadowNotes
copyright: Copyright 2025-2026 Divya Mohan

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - dist-electron/**/*

# WASM files must be outside asar for runtime loading
asarUnpack:
  - "**/*.wasm"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ShadowNotes
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
